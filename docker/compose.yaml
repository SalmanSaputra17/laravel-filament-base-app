services:
    app:
        build:
            context: ..
            dockerfile: docker/Dockerfile
        container_name: base_app_app
        restart: unless-stopped
        volumes:
            - ..:/var/www/html
            - composer_cache:/root/.composer
            - node_modules:/var/www/html/node_modules
        environment:
            - DB_CONNECTION=mysql
            - DB_HOST=base_app_db
            - DB_PORT=3306
            - DB_DATABASE=${DB_DATABASE:-base_app}
            - DB_USERNAME=${DB_USERNAME:-base_app_user}
            - DB_PASSWORD=${DB_PASSWORD:-password}
            - APP_ENV=${APP_ENV:-local}
            - APP_DEBUG=${APP_DEBUG:-true}
            - REDIS_HOST=base_app_redis
        networks:
            - base_app_network

    nginx:
        image: nginx:stable-alpine
        container_name: base_app_nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ..:/var/www/html
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - base_app_network

    db:
        image: mariadb:10.11
        container_name: base_app_db
        restart: unless-stopped
        environment:
            MARIADB_DATABASE: ${DB_DATABASE:-base_app}
            MARIADB_USER: ${DB_USERNAME:-base_app_user}
            MARIADB_PASSWORD: ${DB_PASSWORD:-password}
            MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-password}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - base_app_network
        ports:
            - "3306:3306"

    redis:
        image: redis:7-alpine
        container_name: base_app_redis
        restart: unless-stopped
        networks:
            - base_app_network
        ports:
            - "6379:6379"

networks:
    base_app_network:
        driver: bridge

volumes:
    db_data:
        driver: local
    composer_cache:
        driver: local
    node_modules:
        driver: local
